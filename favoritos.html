<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Deseos | ABRIL VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --dior-black: #050505;
            --dior-gold: #e8c3b0;
            --dior-gray: #757575;
            --white: #ffffff;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dior-black); color: var(--white); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            padding: 30px 60px; border-bottom: 1px solid #111;
            display: flex; justify-content: space-between; align-items: center; background: #000;
        }
        .btn-back { color: var(--dior-gray); font-size: 10px; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; transition: var(--transition); }
        .btn-back:hover { color: var(--dior-gold); }
        .logo-mini { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 12px; color: var(--white); text-align: center; position: absolute; left: 50%; transform: translateX(-50%); }

        /* --- CONTENIDO --- */
        .page-title {
            text-align: center; margin: 80px 0 60px;
        }
        .page-title h1 { font-family: 'Cinzel', serif; font-size: 36px; letter-spacing: 6px; font-weight: 400; color: var(--dior-gold); }
        .page-title p { font-size: 10px; color: var(--dior-gray); letter-spacing: 4px; text-transform: uppercase; margin-top: 15px; }

        /* --- GRID FAVORITOS --- */
        .wishlist-grid {
            max-width: 1400px; margin: 0 auto 100px; padding: 0 60px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px;
        }

        .wish-card {
            background: #0a0a0a; border: 1px solid #111; position: relative;
            transition: var(--transition); display: flex; flex-direction: column;
        }
        .wish-card:hover { border-color: var(--dior-gold); transform: translateY(-5px); }

        .img-box { width: 100%; height: 350px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 1s ease; }
        .wish-card:hover .img-box img { transform: scale(1.05); }

        .card-info { padding: 30px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-family: 'Cinzel', serif; font-size: 16px; margin-bottom: 8px; letter-spacing: 1px; }
        .item-ref { font-family: monospace; font-size: 10px; color: var(--dior-gray); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .item-price { font-family: 'Cinzel', serif; font-size: 20px; color: var(--dior-gold); margin-bottom: 20px; }

        .btn-remove {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-remove:hover { border-color: #ff4b4b; color: #ff4b4b; }

        /* --- ESTADO VACÍO --- */
        .empty-state { text-align: center; padding: 100px 20px; grid-column: 1 / -1; }
        .empty-state i { font-size: 50px; color: #222; margin-bottom: 30px; }
        .empty-state h2 { font-family: 'Cinzel', serif; font-size: 24px; color: var(--dior-gray); margin-bottom: 20px; }
        .btn-explore {
            display: inline-block; margin-top: 30px; padding: 18px 50px; background: var(--white);
            color: #000; text-decoration: none; font-size: 10px; letter-spacing: 4px;
            text-transform: uppercase; font-weight: 600; transition: 0.3s;
        }
        .btn-explore:hover { background: var(--dior-gold); }

        footer { text-align: center; padding: 40px; font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            .wishlist-grid { padding: 0 20px; grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .img-box { height: 250px; }
            .logo-mini { position: static; transform: none; }
            header { padding: 25px; }
        }
        @media (max-width: 480px) { .wishlist-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Regresar</a>
        <div class="logo-mini">ABRIL</div>
        <div style="width: 100px;"></div> </header>

    <div class="page-title">
        <h1>Lista de Deseos</h1>
        <p>Sus piezas exclusivas seleccionadas</p>
    </div>

    <div id="wishlist-render" class="wishlist-grid">
        </div>

    <footer>
        Directora de Operaciones: Abril Armas | © 2026 ABRIL STORE
    </footer>

    <script>
        let wishlist = JSON.parse(localStorage.getItem('abrilWishlist')) || [];

        function loadWishlist() {
            const container = document.getElementById('wishlist-render');
            container.innerHTML = '';

            if (wishlist.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-heart"></i>
                        <h2>Su lista de deseos está vacía</h2>
                        <p style="font-size:12px; color:var(--dior-gray); letter-spacing:2px; font-weight:300;">Guarde aquí las piezas que más le inspiren.</p>
                        <a href="index.html" class="btn-explore">Explorar Colecciones</a>
                    </div>
                `;
                return;
            }

            wishlist.forEach((item, index) => {
                let refHtml = item.ref ? `<p class="item-ref">${item.ref}</p>` : '';
                container.innerHTML += `
                    <div class="wish-card">
                        <div class="img-box">
                            <img src="${item.img}" alt="${item.name}">
                        </div>
                        <div class="card-info">
                            <div>
                                <h3 class="item-name">${item.name}</h3>
                                ${refHtml}
                                <p class="item-price">L. ${item.price}</p>
                            </div>
                            <button class="btn-remove" onclick="removeItem(${index})"><i class="fas fa-times"></i> Eliminar de la lista</button>
                        </div>
                    </div>
                `;
            });
        }

        function removeItem(index) {
            wishlist.splice(index, 1);
            localStorage.setItem('abrilWishlist', JSON.stringify(wishlist));
            loadWishlist();
        }

        window.onload = loadWishlist;
    </script>
</body>
</html>
