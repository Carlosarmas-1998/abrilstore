<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewelry Collection | ABRIL VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTÉTICA DIOR LUXE --- */
        :root {
            --dior-black: #0a0a0a;
            --dior-gold: #e8c3b0;
            --dior-gray: #757575;
            --white: #ffffff;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dior-black); color: var(--white); overflow-x: hidden; }

        /* --- NAVEGACIÓN --- */
        .nav-header {
            position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-back { color: var(--dior-gray); font-size: 10px; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; transition: 0.3s; }
        .btn-back:hover { color: var(--dior-gold); }
        .logo-mini { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 10px; color: var(--white); position: absolute; left: 50%; transform: translateX(-50%); }
        
        .nav-actions { display: flex; gap: 30px; align-items: center; }
        .icon-wrapper { position: relative; cursor: pointer; color: #fff; font-size: 18px; transition: 0.3s; }
        .badge-count {
            position: absolute; top: -8px; right: -10px; background: var(--dior-gold); color: #000;
            font-size: 9px; font-weight: 800; width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- HERO & ESPECIALES --- */
        .collection-hero { padding: 180px 20px 60px; text-align: center; max-width: 900px; margin: 0 auto; }
        .title-main { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 400; line-height: 1.1; margin-bottom: 40px; }

        /* BOTÓN JOYAS ESPECIALES */
        .btn-special-jewelry {
            display: inline-block; padding: 25px 60px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            color: var(--dior-gold); border: 1px solid var(--dior-gold); font-family: 'Cinzel', serif;
            font-size: 16px; letter-spacing: 6px; text-transform: uppercase; cursor: pointer;
            transition: all 0.5s ease; position: relative; overflow: hidden; margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(232, 195, 176, 0.2);
        }
        .btn-special-jewelry:hover {
            background: var(--dior-gold); color: #000; transform: scale(1.05);
            box-shadow: 0 0 40px rgba(232, 195, 176, 0.4);
        }

        /* --- GALERÍA --- */
        .gallery-wrapper { padding: 0 50px 100px; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px; }
        .model-card { background: #000; border: 1px solid #111; transition: var(--transition); position: relative; }
        .model-card:hover { border-color: var(--dior-gold); transform: translateY(-10px); }
        
        .img-container { width: 100%; height: 400px; overflow: hidden; position: relative; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; transition: 1.2s ease; }
        .model-card:hover .img-container img { transform: scale(1.1); }

        .btn-heart {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; z-index: 10;
        }
        .btn-heart.active { color: #ff4b4b; border-color: #ff4b4b; background: rgba(255,75,75,0.1); }
        
        .card-details { padding: 40px 30px; text-align: center; }
        .model-name { font-family: 'Cinzel', serif; font-size: 18px; color: var(--white); margin-bottom: 8px; letter-spacing: 1px; }
        .model-ref { font-family: monospace; font-size: 11px; color: var(--dior-gray); letter-spacing: 3px; margin-bottom: 20px; }
        .model-price { font-family: 'Cinzel', serif; font-size: 24px; color: var(--dior-gold); margin-bottom: 25px; }

        .qty-container {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            border: 1px solid #222; width: fit-content; margin: 0 auto 25px; padding: 5px 15px;
        }
        .qty-btn { background: none; border: none; color: var(--white); cursor: pointer; font-size: 16px; }
        .qty-val { font-size: 14px; font-family: 'Cinzel', serif; min-width: 25px; }

        .btn-buy {
            display: block; width: 100%; padding: 20px; background: transparent; border: 1px solid var(--white);
            color: var(--white); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 500;
            transition: 0.4s; cursor: pointer;
        }
        .btn-buy:hover { background: var(--white); color: #000; }

        /* --- SIDEBARS --- */
        .sidebar { position: fixed; top: 0; right: -500px; width: 100%; max-width: 480px; height: 100%; background: #080808; z-index: 2001; padding: 50px; display: flex; flex-direction: column; transition: var(--transition); border-left: 1px solid #111; }
        .sidebar.show { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; backdrop-filter: blur(10px); }
        .overlay.show { display: block; }
        
        .item-row { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #111; align-items: center; }
        .item-row img { width: 60px; height: 60px; object-fit: contain; background: #000; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 1px solid var(--dior-gold); padding: 40px; border-radius: 2px; width: 90%; max-width: 500px; z-index: 3000; display: none; }
        .modal.show { display: block; }
        .receipt-box { background: #000; padding: 25px; border: 1px dashed #333; margin-top: 20px; font-family: monospace; font-size: 12px; }

        .toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: var(--dior-gold); color: #000; padding: 15px 40px; border-radius: 2px; font-size: 12px; font-weight: 600; z-index: 4000; transition: 0.4s; }
        .toast.show { bottom: 40px; }

        @media (max-width: 768px) {
            .gallery-wrapper { padding: 0 20px 60px; grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .sidebar { max-width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Regresar</a>
        <div class="logo-mini">ABRIL</div>
        <div class="nav-actions">
            <div class="icon-wrapper" onclick="toggleSidebar('wishlist-sidebar')">
                <i class="fa-regular fa-heart"></i><span class="badge-count" id="wish-count">0</span>
            </div>
            <div class="icon-wrapper" onclick="toggleSidebar('cart-sidebar')">
                <i class="fa-solid fa-bag-shopping"></i><span class="badge-count" id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="collection-hero">
        <h1 class="title-main">Jewelry Collection</h1>
        
        <a href="acero.html" class="btn-special-jewelry">JOYAS ESPECIALES</a>
        
        <p style="font-size: 12px; color: var(--dior-gray); letter-spacing: 3px; text-transform: uppercase;">Set de Cadena & Aretes | Importación VIP</p>
    </header>

    <section class="gallery-wrapper" id="product-grid"></section>

    <div class="overlay" id="main-overlay" onclick="closeSidebars()"></div>

    <div class="sidebar" id="cart-sidebar">
        <h2 style="font-family:Cinzel; margin-bottom:40px; letter-spacing:4px;">Mi Bolsa</h2>
        <div id="cart-items-container" style="flex:1; overflow-y:auto;"></div>
        <div style="margin-top:auto; padding-top:30px; border-top:1px solid #111;">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px; font-family:Cinzel; font-size:18px;">
                <span>Total:</span><span id="cart-total-price">L. 0</span>
            </div>
            <button class="btn-buy" style="background:#fff; color:#000;" onclick="openPayment()">Confirmar Pedido</button>
        </div>
    </div>

    <div class="sidebar" id="wishlist-sidebar">
        <h2 style="font-family:Cinzel; margin-bottom:40px; letter-spacing:4px;">Favoritos</h2>
        <div id="wishlist-items-container" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div class="modal" id="payment-modal">
        <h2 style="font-family:Cinzel; color:var(--dior-gold); text-align:center;">Finalizar Compra</h2>
        <input type="email" id="customer-email" placeholder="Correo Electrónico" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; margin:20px 0;">
        <button class="btn-buy" style="background:var(--dior-gold); color:#000;" onclick="processPayment()">Pagar con Tarjeta</button>
    </div>

    <div class="modal" id="receipt-modal">
        <h2 style="font-family:Cinzel; color:var(--dior-gold); text-align:center;">Justificante de Compra</h2>
        <div class="receipt-box" id="receipt-content"></div>
        <button class="btn-buy" style="margin-top:20px; background:#fff; color:#000;" onclick="location.reload()">Cerrar</button>
    </div>

    <div class="toast" id="toastAlert">Mensaje</div>

    <script>
        const products = [
            { id: 'j1', name: 'Set Éclat XXX', ref: 'JW-9001', price: 199, img: 'j1.jpg' },
            { id: 'j2', name: 'Set Lumière XXX', ref: 'JW-9002', price: 199, img: 'j2.jpg' },
            { id: 'j3', name: 'Set Royale XXX', ref: 'JW-9003', price: 245, img: 'j3.jpg' },
            { id: 'j4', name: 'Set Divine XXX', ref: 'JW-9004', price: 245, img: 'j4.jpg' },
            { id: 'j5', name: 'Set Pureté XXX', ref: 'JW-9005', price: 189, img: 'j5.jpg' },
            { id: 'j6', name: 'Set Mystère XXX', ref: 'JW-9006', price: 189, img: 'j6.jpg' },
            { id: 'j7', name: 'Set Rare Perla XXX', ref: 'JW-9007', price: 299, img: 'j7.jpg' },
            { id: 'j8', name: 'Set Prestige XXX', ref: 'JW-9008', price: 299, img: 'j8.jpg' },
            { id: 'j9', name: 'Collar Virgen María', ref: 'JW-9009', price: 299, img: 'j9.jpg' },
            { id: 'j0', name: 'Set Aura XXX', lema: "Incluye anillo", ref: 'JW-9010', price: 299, img: 'j0.jpg' }
        ];

        let cart = JSON.parse(localStorage.getItem('abrilCart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('abrilWishlist')) || [];
        let quantities = {};

        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            quantities[p.id] = 1;
            grid.innerHTML += `
                <article class="model-card">
                    <div class="img-container">
                        <button class="btn-heart" onclick="toggleHeart('${p.id}', '${p.name}', '${p.ref}', ${p.price}, '${p.img}', this)"><i class="fas fa-heart"></i></button>
                        <img src="${p.img}">
                    </div>
                    <div class="card-details">
                        <h3 class="model-name">${p.name}</h3>
                        <p class="model-ref">${p.ref}</p>
                        <p class="model-price">L. ${p.price}</p>
                        <div class="qty-container">
                            <button class="qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
                            <span class="qty-val" id="qty-${p.id}">1</span>
                            <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
                        </div>
                        <button class="btn-buy" onclick="addToCart('${p.id}', '${p.name}', '${p.ref}', ${p.price}, '${p.img}')">Añadir a la bolsa</button>
                    </div>
                </article>`;
        });

        function updateQty(id, d) { let n = (quantities[id] || 1) + d; if (n >= 1 && n <= 10) { quantities[id] = n; document.getElementById('qty-' + id).textContent = n; } }

        function addToCart(id, n, ref, p, img) {
            const q = quantities[id] || 1;
            cart.push({ id: id + Date.now(), name: n, ref, price: p * q, qty: q, img });
            saveData(); updateUI(); showToast('Set añadido a su bolsa de compras'); toggleSidebar('cart-sidebar');
        }

        function toggleHeart(id, n, ref, p, img, btn) {
            const idx = wishlist.findIndex(x => x.ref === ref);
            if(idx > -1) { wishlist.splice(idx, 1); btn.classList.remove('active'); }
            else { wishlist.push({name: n, ref, price: p, img}); btn.classList.add('active'); }
            saveData(); updateUI();
        }

        function removeCart(idx) { cart.splice(idx, 1); saveData(); updateUI(); }
        function saveData() { localStorage.setItem('abrilCart', JSON.stringify(cart)); localStorage.setItem('abrilWishlist', JSON.stringify(wishlist)); }

        function updateUI() {
            document.getElementById('wish-count').textContent = wishlist.length;
            document.getElementById('cart-count').textContent = cart.length;
            const cartC = document.getElementById('cart-items-container');
            let total = 0; cartC.innerHTML = '';
            cart.forEach((item, idx) => {
                total += item.price;
                cartC.innerHTML += `<div class="item-row"><img src="${item.img}"><div style="flex:1"><h4 style="font-family:Cinzel; font-size:12px;">${item.name}</h4><p style="font-size:9px; color:gray;">CANT: ${item.qty}</p><p style="color:var(--dior-gold); font-weight:600;">L. ${item.price}</p></div><button onclick="removeCart(${idx})" style="background:none; border:none; color:#444; cursor:pointer;"><i class="fas fa-trash"></i></button></div>`;
            });
            document.getElementById('cart-total-price').textContent = 'L. ' + total;
            const wishC = document.getElementById('wishlist-items-container');
            wishC.innerHTML = '';
            wishlist.forEach(x => { wishC.innerHTML += `<div class="item-row"><img src="${x.img}"><div><h4 style="font-family:Cinzel; font-size:12px;">${x.name}</h4><p style="color:var(--dior-gold);">L. ${x.price}</p></div></div>`; });
        }

        function toggleSidebar(id) { closeSidebars(); document.getElementById(id).classList.add('show'); document.getElementById('main-overlay').classList.add('show'); }
        function closeSidebars() { document.querySelectorAll('.sidebar, .overlay').forEach(el => el.classList.remove('show')); }
        function showToast(m) { const t = document.getElementById('toastAlert'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function openPayment() { if(cart.length === 0) return; closeSidebars(); document.getElementById('payment-modal').classList.add('show'); document.getElementById('main-overlay').classList.add('show'); }

        function processPayment() {
            const email = document.getElementById('customer-email').value; if(!email) return alert('Ingrese su correo');
            const now = new Date(); let itemsHtml = cart.map(i => `<p>${i.qty}x ${i.name} - L.${i.price}</p>`).join('');
            document.getElementById('receipt-content').innerHTML = `<p>Orden: ORD-${Math.floor(Math.random()*100000)}</p><p>Fecha: ${now.toLocaleDateString()}</p><hr style="margin:10px 0; border-top:1px solid #333;">${itemsHtml}<hr style="margin:10px 0; border-top:1px solid #333;"><p style="color:var(--dior-gold)">TOTAL PAGADO: ${document.getElementById('cart-total-price').textContent}</p><p style="margin-top:15px; font-size:10px;">Entrega: Punto de encuentro Choluteca. Empaque discreto y exclusivo.</p>`;
            document.getElementById('payment-modal').style.display='none'; document.getElementById('receipt-modal').classList.add('show');
            cart = []; saveData(); updateUI();
        }

        updateUI();
    </script>
</body>
</html>
