<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewelry Collection | ABRIL VIP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           VARIABLES GLOBALES - MINIMALISMO DE LUJO
           ========================================================================== */
        :root {
            --bg-dark: #070707;
            --bg-card: #0a0a0a;
            --accent-gold: #c5a059; 
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --border-light: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ==========================================================================
           RESET Y BASE
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, .serif {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
        }

        /* ==========================================================================
           HEADER INTELIGENTE
           ========================================================================== */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 50px; background: rgba(7, 7, 7, 0.95); 
            backdrop-filter: blur(10px); z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: transform 0.4s ease;
        }
        .header-hidden { transform: translateY(-100%); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-muted); transition: var(--transition); text-decoration: none;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }

        /* ==========================================================================
           ICONOS FIJOS
           ========================================================================== */
        .nav-actions-fixed {
            position: fixed; top: 30px; right: 50px; display: flex; gap: 25px; 
            z-index: 1100; align-items: center;
        }
        .icon-wrapper { 
            position: relative; cursor: pointer; color: var(--text-main); 
            font-size: 16px; transition: var(--transition); 
        }
        .icon-wrapper:hover { color: var(--accent-gold); }
        .badge-count {
            position: absolute; top: -6px; right: -8px; background: var(--text-main); color: var(--bg-dark);
            font-size: 8px; font-weight: 500; width: 14px; height: 14px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* ==========================================================================
           INTRODUCCIÓN DIRECTA
           ========================================================================== */
        .intro-section { 
            padding: 160px 40px 60px; 
            text-align: center; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        
        .special-label {
            display: inline-block; color: var(--accent-gold); font-size: 11px; 
            letter-spacing: 6px; text-transform: uppercase; margin-bottom: 25px; 
            border: 1px solid var(--accent-gold); padding: 8px 20px;
            background: rgba(197, 160, 89, 0.05); font-weight: 500;
        }

        .title-main { 
            font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 15px; 
            letter-spacing: 2px; font-style: italic; color: var(--text-main);
        }
        .intro-desc {
            font-size: 13px; color: var(--text-muted); line-height: 1.8; 
            font-weight: 300; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase;
        }

        .btn-special-jewelry {
            display: inline-block; padding: 18px 45px; background: transparent;
            color: var(--text-main); border: 1px solid var(--border-light); 
            font-size: 10px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
            transition: var(--transition); text-decoration: none;
        }
        .btn-special-jewelry:hover {
            background: var(--text-main); color: var(--bg-dark); 
        }

        /* ==========================================================================
           GALERÍA DE PRODUCTOS
           ========================================================================== */
        .gallery-wrapper { 
            padding: 20px 50px 120px; max-width: 1400px; margin: 0 auto; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; 
        }
        .model-card { 
            background: var(--bg-card); transition: var(--transition); position: relative; 
            border: 1px solid transparent;
        }
        
        .img-container { 
            width: 100%; height: 500px; overflow: hidden; position: relative; 
            display: flex; align-items: center; justify-content: center; background: transparent; 
            cursor: default;
        }
        .img-container img { 
            width: 100%; height: 100%; object-fit: contain; 
            transition: transform 1.2s ease; opacity: 0.95;
        }
        .model-card:hover .img-container img { transform: scale(1.05); opacity: 1; }

        .btn-heart { 
            position: absolute; top: 20px; right: 20px; background: transparent; 
            border: none; color: rgba(255,255,255,0.4); font-size: 18px;
            cursor: pointer; transition: var(--transition); z-index: 10; 
        }
        .btn-heart:hover { color: var(--text-main); transform: scale(1.1); }
        .btn-heart.active { color: var(--accent-gold); }
        
        .card-details { padding: 20px 20px 40px; text-align: center; }
        .model-name { font-size: 22px; color: var(--text-main); margin-bottom: 5px; font-style: italic; }
        .model-ref { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 15px; }
        
        /* ESTILO DE LA DESCRIPCIÓN ELEGANTE */
        .model-desc {
            font-size: 10px; color: var(--text-muted); line-height: 1.6;
            margin-bottom: 20px; font-weight: 300; padding: 0 10px;
        }

        .model-price { font-size: 16px; color: var(--text-main); margin-bottom: 25px; letter-spacing: 1px; }

        .qty-container { 
            display: flex; align-items: center; justify-content: center; gap: 20px; 
            margin-bottom: 25px;
        }
        .qty-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; transition: var(--transition); }
        .qty-btn:hover { color: var(--text-main); }
        .qty-val { font-size: 13px; min-width: 15px; font-family: 'Cormorant Garamond', serif; }

        .btn-buy { 
            display: block; width: 100%; padding: 16px; background: transparent; 
            border: 1px solid var(--border-light); color: var(--text-main); font-size: 9px; 
            letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: var(--transition); 
        }
        .btn-buy:hover { background: var(--text-main); color: var(--bg-dark); }

        /* ==========================================================================
           MODO SELECCIÓN RÁPIDA (ELEGIR MÚLTIPLES)
           ========================================================================== */
        body.selection-mode .img-container { cursor: pointer; }
        
        body.selection-mode .img-container img {
            animation: slowFloat 4s ease-in-out infinite alternate;
        }

        @keyframes slowFloat {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-8px) scale(1.02); }
        }

        body.selection-mode .btn-buy { display: none; }
        body.selection-mode .btn-heart { display: none; }

        .select-indicator {
            position: absolute; top: 20px; left: 20px; width: 25px; height: 25px;
            border-radius: 50%; border: 1px solid var(--text-muted); background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center; z-index: 10;
            color: transparent; transition: var(--transition); font-size: 12px;
        }
        body.selection-mode .select-indicator { display: flex; }

        .model-card.selected { border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.1); }
        .model-card.selected .select-indicator { background: var(--accent-gold); border-color: var(--accent-gold); color: var(--bg-dark); }
        .model-card.selected .img-container img { animation-play-state: paused; transform: scale(1.05); opacity: 1;}

        .magic-action-container {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(7,7,7,0.95); backdrop-filter: blur(10px);
            padding: 20px; text-align: center; z-index: 3000;
            border-top: 1px solid var(--border-light);
            transition: transform 0.5s ease;
        }

        .btn-magic {
            background: var(--text-main); color: var(--bg-dark); border: none;
            padding: 20px 60px; font-size: 11px; font-weight: 600; letter-spacing: 5px;
            text-transform: uppercase; cursor: pointer; transition: var(--transition);
            width: 100%; max-width: 600px;
        }

        .btn-magic.pay-mode {
            background: var(--accent-gold); color: var(--bg-dark);
            animation: pulseGold 2s infinite;
        }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }

        /* ==========================================================================
           NOTIFICACIÓN TOAST
           ========================================================================== */
        .toast { 
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%); 
            background: var(--text-main); color: var(--bg-dark); padding: 15px 40px; 
            font-size: 9px; font-weight: 500; z-index: 4000; 
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            letter-spacing: 2px; text-transform: uppercase;
            opacity: 0; visibility: hidden;
        }
        .toast.show { opacity: 1; visibility: visible; }

        /* ==========================================================================
           FOOTER
           ========================================================================== */
        footer { padding: 60px 40px 150px; text-align: center; border-top: 1px solid var(--border-light); }
        .contact-info { 
            font-size: 9px; color: var(--text-muted); letter-spacing: 2px; 
            text-transform: uppercase; line-height: 2.5; 
        }
        .contact-info strong { color: var(--text-main); font-weight: 400; }

        @media (max-width: 768px) {
            header { padding: 0 20px; height: 70px; }
            .nav-links { display: none; }
            .nav-actions-fixed { right: 20px; top: 25px; }
            .intro-section { padding-top: 120px; }
            .gallery-wrapper { padding: 0 20px 60px; grid-template-columns: 1fr; gap: 40px; }
            .img-container { height: 400px; }
            .btn-magic { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <div class="nav-actions-fixed">
        <div class="icon-wrapper" onclick="window.location.href='favoritos.html'">
            <i class="fa-regular fa-heart"></i>
            <span class="badge-count" id="wish-count">0</span>
        </div>
        <div class="icon-wrapper" onclick="window.location.href='carrito.html'">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="badge-count" id="cart-count">0</span>
        </div>
    </div>

    <header id="smart-header">
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="dama.html">Dama</a>
            <a href="niña.html">Niña</a>
            <a href="joyeria.html" class="active">Joyería</a>
            <a href="acero.html">Acero VIP</a>
        </nav>
    </header>

    <section class="intro-section">
        <div class="special-label">SHEIN VIP EXCLUSIVE</div>
        <h1 class="title-main">Jewelry Collection</h1>
        <p class="intro-desc">Set de Cadena & Aretes | Importación VIP</p>
        <a href="acero.html" class="btn-special-jewelry">Descubrir Joyas de Acero Especiales</a>
    </section>

    <section class="gallery-wrapper" id="product-grid"></section>

    <div class="magic-action-container">
        <button class="btn-magic" id="btn-master-action" onclick="handleMasterAction()">ELEGIR MÚLTIPLES PIEZAS</button>
    </div>

    <div class="toast" id="toastAlert">Mensaje</div>

    <footer>
        <div class="contact-info">
            <p>Colección de Joyería VIP</p>
            <p>Disponibilidad en Choluteca.</p>
            <p style="margin-top: 30px; opacity: 0.3;">© 2026 ABRIL STORE | SHEIN VIP EXCLUSIVITÉ</p>
        </div>
    </footer>

    <script>
        // Efecto scroll Header
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            const header = document.getElementById('smart-header');
            
            if (currentScroll <= 10) {
                header.classList.remove('header-hidden');
                header.classList.remove('header-active');
                return;
            }
            if (currentScroll > lastScroll && !header.classList.contains('header-hidden')) {
                header.classList.add('header-hidden');
            } else if (currentScroll < lastScroll && header.classList.contains('header-hidden')) {
                header.classList.remove('header-hidden');
                header.classList.add('header-active');
            }
            lastScroll = currentScroll;
        });

        // Bases de datos locales
        let cart = JSON.parse(localStorage.getItem('abrilCart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('abrilWishlist')) || [];
        let quantities = {};

        // Variables de Modo Selección
        let isSelectionMode = false;
        let selectedCards = new Set();

        const products = [
            { 
                id: 'j1', name: 'Set Éclat', ref: 'JW-9001', price: 199, img: 'j1.jpg',
                desc: 'Conjunto forjado en delicadas aleaciones jewelry. Su cadena y pendientes están diseñados para capturar la luz y deslumbrar en cada movimiento.'
            },
            { 
                id: 'j2', name: 'Set Lumière', ref: 'JW-9002', price: 199, img: 'j2.jpg',
                desc: 'Resplandor clásico. Cadena y pendientes de aleaciones jewelry finamente pulidas, perfectos para aportar un toque de luz a tu silueta diaria.'
            },
            { 
                id: 'j3', name: 'Set Royale', ref: 'JW-9003', price: 245, img: 'j3.jpg',
                desc: 'Majestuosidad atemporal. Un set exclusivo de cadena y pendientes creados en aleaciones jewelry de alta resistencia y un acabado indiscutiblemente premium.'
            },
            { 
                id: 'j4', name: 'Set Divine', ref: 'JW-9004', price: 245, img: 'j4.jpg',
                desc: 'La esencia de la divinidad. Fina cadena y pendientes a juego en aleaciones jewelry, combinando elegancia sutil y diseño contemporáneo.'
            },
            { 
                id: 'j5', name: 'Set Pureté', ref: 'JW-9005', price: 189, img: 'j5.jpg',
                desc: 'Líneas limpias y minimalistas. Este delicado set de cadena y pendientes en aleaciones jewelry es el complemento ideal de la mujer moderna.'
            },
            { 
                id: 'j6', name: 'Set Mystère', ref: 'JW-9006', price: 189, img: 'j6.jpg',
                desc: 'Enigmático y seductor. Conjunto de cadena y pendientes esculpidos en selectas aleaciones jewelry que aportan un inconfundible aura de misterio.'
            },
            { 
                id: 'j7', name: 'Set Rare Perla', ref: 'JW-9007', price: 299, img: 'j7.jpg',
                desc: 'Elegancia nacarada. Exquisita cadena y pendientes en aleaciones jewelry, sutilmente coronados con perlas que evocan la sofisticación absoluta.'
            },
            { 
                id: 'j8', name: 'Set Prestige', ref: 'JW-9008', price: 299, img: 'j8.jpg',
                desc: 'Símbolo de estatus. Un set imponente de cadena y pendientes forjados en ricas aleaciones jewelry para deslumbrar en tus galas más exclusivas.'
            },
            { 
                id: 'j9', name: 'Collar Virgen María', ref: 'JW-9009', price: 299, img: 'j9.jpg',
                desc: 'Devoción y lujo. Hermoso collar con colgante elaborado meticulosamente en aleaciones jewelry, una pieza de fe con un acabado celestial.'
            },
            { 
                id: 'j0', name: 'Set Aura', lema: "Incluye anillo exclusivo", ref: 'JW-9010', price: 299, img: 'j0.jpg',
                desc: 'Deslumbra con este juego completo de cadena, pendientes y anillo. Forjado en finas aleaciones jewelry garantizando un brillo cautivador y duradero.'
            }
        ];

        // Renderizado del Grid
        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            quantities[p.id] = 1;
            grid.innerHTML += `
                <article class="model-card" id="card-${p.id}" data-id="${p.id}" data-name="${p.name}" data-ref="${p.ref}" data-price="${p.price}" data-img="${p.img}">
                    <div class="select-indicator"><i class="fa-solid fa-check"></i></div>
                    <div class="img-container" onclick="toggleSelection('card-${p.id}')">
                        <button class="btn-heart" onclick="toggleHeart(event, '${p.id}', '${p.name}', '${p.ref}', ${p.price}, '${p.img}', this)">
                            <i class="fas fa-heart"></i>
                        </button>
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="card-details">
                        <h3 class="model-name">${p.name}</h3>
                        <p class="model-ref">${p.ref}</p>
                        ${p.lema ? `<p style="font-size: 9px; color: var(--accent-gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;">${p.lema}</p>` : ''}
                        <p class="model-desc">${p.desc}</p>
                        <p class="model-price">L. ${p.price}</p>
                        
                        <div class="qty-container">
                            <button class="qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
                            <span class="qty-val serif" id="qty-${p.id}">1</span>
                            <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
                        </div>

                        <button class="btn-buy" onclick="addToCart('${p.id}', '${p.name}', '${p.ref}', ${p.price}, '${p.img}')">Añadir a la bolsa</button>
                    </div>
                </article>`;
        });

        function initPage() {
            document.getElementById('wish-count').textContent = wishlist.length;
            document.getElementById('cart-count').textContent = cart.length;

            const allHearts = document.querySelectorAll('.btn-heart');
            allHearts.forEach(btn => {
                const onclickStr = btn.getAttribute('onclick');
                if(!onclickStr) return;
                const refMatch = onclickStr.match(/'(JW-\d+)'/);
                if(refMatch) {
                    const ref = refMatch[1];
                    const isSaved = wishlist.some(item => item.ref === ref);
                    if(isSaved) btn.classList.add('active');
                }
            });
        }

        function updateQty(id, d) { 
            let n = (quantities[id] || 1) + d; 
            if (n >= 1 && n <= 10) { 
                quantities[id] = n; 
                document.getElementById('qty-' + id).textContent = n; 
            } 
        }

        // AGREGAR AL CARRITO INDIVIDUAL
        function addToCart(id, n, ref, p, img) {
            const q = quantities[id] || 1;
            cart.push({ 
                id: id + Date.now(), 
                name: n, ref: ref, 
                basePrice: p, price: p * q, 
                qty: q, 
                size: "Talla Única", 
                img: img 
            });
            saveData(); 
            showToast('Añadido a su bolsa exclusiva');
        }

        // FAVORITOS
        function toggleHeart(event, id, n, ref, p, img, btn) {
            event.stopPropagation(); 
            const idx = wishlist.findIndex(x => x.ref === ref);
            if(idx > -1) { 
                wishlist.splice(idx, 1); btn.classList.remove('active'); showToast('Retirado de favoritos');
            } else { 
                wishlist.push({id: id, name: n, ref: ref, price: p, img: img}); btn.classList.add('active'); showToast('Guardado en favoritos');
            }
            saveData();
        }

        function saveData() { 
            localStorage.setItem('abrilCart', JSON.stringify(cart)); 
            localStorage.setItem('abrilWishlist', JSON.stringify(wishlist)); 
            document.getElementById('wish-count').textContent = wishlist.length;
            document.getElementById('cart-count').textContent = cart.length;
        }

        // ==========================================================
        // LÓGICA DEL MODO SELECCIÓN RÁPIDA (JOYERÍA)
        // ==========================================================

        function handleMasterAction() {
            const btn = document.getElementById('btn-master-action');

            if (!isSelectionMode) {
                isSelectionMode = true;
                document.body.classList.add('selection-mode');
                btn.textContent = "SELECCIONE LAS PIEZAS ARRIBA";
                showToast('Modo de selección rápida activado');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } 
            else if (isSelectionMode && selectedCards.size > 0) {
                procesarMultiplesAlCarrito();
            }
        }

        function toggleSelection(cardId) {
            if (!isSelectionMode) return; 

            const card = document.getElementById(cardId);
            
            if (selectedCards.has(cardId)) {
                selectedCards.delete(cardId);
                card.classList.remove('selected');
            } else {
                selectedCards.add(cardId);
                card.classList.add('selected');
            }

            actualizarBotonMaster();
        }

        function actualizarBotonMaster() {
            const btn = document.getElementById('btn-master-action');
            if (selectedCards.size > 0) {
                btn.innerHTML = `<i class="fa-solid fa-bag-shopping"></i> Mover ${selectedCards.size} piezas a la Bolsa y Pagar`;
                btn.classList.add('pay-mode');
            } else {
                btn.textContent = "SELECCIONE LAS PIEZAS ARRIBA";
                btn.classList.remove('pay-mode');
            }
        }

        function procesarMultiplesAlCarrito() {
            selectedCards.forEach(cardId => {
                const card = document.getElementById(cardId);
                const id = card.getAttribute('data-id');
                const name = card.getAttribute('data-name');
                const ref = card.getAttribute('data-ref');
                const price = parseFloat(card.getAttribute('data-price'));
                const img = card.getAttribute('data-img');
                
                const qty = quantities[id] || 1;
                
                cart.push({ 
                    id: id + Date.now() + Math.random(), 
                    name: name, ref: ref, basePrice: price, 
                    price: price * qty, qty: qty, size: "Talla Única", img: img 
                });
            });

            localStorage.setItem('abrilCart', JSON.stringify(cart));
            
            showToast('Piezas transferidas. Redirigiendo a pago...');
            setTimeout(() => {
                window.location.href = 'carrito.html';
            }, 1200);
        }

        function showToast(m) { 
            const t = document.getElementById('toastAlert'); 
            t.textContent = m; t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 3000); 
        }

        window.onload = initPage;

    </script>
</body>
</html>
