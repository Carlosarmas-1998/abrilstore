<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bolsa VIP | ABRIL STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #070707;
            --bg-card: #0a0a0a;
            --accent-gold: #c5a059; 
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --border-light: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; font-weight: 400; }

        header {
            position: fixed; top: 0; width: 100%; height: 80px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 50px; background: rgba(7, 7, 7, 0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border-light);
        }
        .btn-back { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; transition: var(--transition); }
        .btn-back:hover { color: var(--text-main); }
        .logo-mini { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 8px; position: absolute; left: 50%; transform: translateX(-50%); }

        .cart-wrapper { max-width: 1200px; margin: 150px auto 100px; padding: 0 40px; display: grid; grid-template-columns: 2fr 1fr; gap: 60px; }
        .cart-header { margin-bottom: 40px; border-bottom: 1px solid var(--border-light); padding-bottom: 20px; }
        .cart-title { font-size: 40px; font-style: italic; }
        .cart-count-text { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

        .cart-items { display: flex; flex-direction: column; gap: 30px; }
        .cart-item { display: flex; gap: 30px; background: var(--bg-card); padding: 25px; border: 1px solid var(--border-light); align-items: center; transition: var(--transition); }
        .cart-item:hover { border-color: rgba(197, 160, 89, 0.3); }
        
        .item-img { width: 120px; height: 150px; object-fit: contain; }
        .item-details { flex: 1; }
        .item-name { font-size: 22px; font-style: italic; margin-bottom: 5px; }
        .item-meta { font-size: 10px; color: var(--accent-gold); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.5;}
        .item-price { font-size: 18px; }

        .btn-remove { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: var(--transition); }
        .btn-remove:hover { color: #ff4b4b; transform: scale(1.1); }

        .checkout-box { background: var(--bg-card); border: 1px solid var(--border-light); padding: 40px 30px; position: sticky; top: 120px; }
        .checkout-title { font-size: 24px; font-style: italic; margin-bottom: 30px; color: var(--accent-gold); }
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 15px; letter-spacing: 1px; }
        .summary-total { display: flex; justify-content: space-between; font-size: 20px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-light); }

        .form-group { margin-top: 30px; }
        .form-group input, .form-group select { width: 100%; padding: 15px 0; background: transparent; border: none; border-bottom: 1px solid var(--border-light); color: var(--text-main); outline: none; font-family: 'Montserrat', sans-serif; font-size: 12px; margin-bottom: 20px; letter-spacing: 1px; }
        .form-group input:focus, .form-group select:focus { border-bottom-color: var(--accent-gold); }
        .form-group select { cursor: pointer; color: var(--text-muted); }
        .form-group select option { background: var(--bg-dark); color: var(--text-main); }

        .stripe-badge { display: flex; align-items: center; justify-content: center; gap: 10px; color: #635bff; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px; font-weight: 600; }
        .stripe-badge i { font-size: 24px; }
        .apple-pay-badge { display: flex; align-items: center; justify-content: center; gap: 10px; color: #fff; font-size: 14px; margin-top: 10px; }

        .btn-buy { display: block; width: 100%; padding: 18px; background: var(--text-main); border: none; color: var(--bg-dark); font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: var(--transition); margin-top: 20px; }
        .btn-buy:hover { background: var(--accent-gold); }
        
        .empty-cart-msg { text-align: center; padding: 50px 0; color: var(--text-muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

        /* Pantalla de carga VIP */
        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(10px); }
        .loader-overlay.show { display: flex; }
        .spinner { width: 40px; height: 40px; border: 2px solid var(--border-light); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .cart-wrapper { grid-template-columns: 1fr; } header { padding: 0 20px; } .item-img { width: 80px; height: 100px; } .cart-item { padding: 15px; gap: 15px; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Volver</a>
        <div class="logo-mini">ABRIL</div>
        <div style="width: 70px;"></div> 
    </header>

    <div class="cart-wrapper">
        <div>
            <div class="cart-header">
                <h1 class="cart-title serif">Bolsa de Compras</h1>
                <span class="cart-count-text" id="cart-item-count">0 artículos seleccionados</span>
            </div>
            <div class="cart-items" id="cart-container"></div>
        </div>

        <div class="checkout-box">
            <h2 class="checkout-title serif">Resumen del Pedido</h2>
            <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal" class="serif" style="font-size: 16px;">L. 0</span></div>
            <div class="summary-row"><span>Envío VIP</span><span class="serif" style="font-size: 16px;">Coordinado</span></div>
            <div class="summary-total"><span class="serif" style="font-style: italic;">Total</span><span id="summary-total" class="serif" style="color: var(--accent-gold);">L. 0</span></div>

            <form class="form-group" id="checkout-form" action="https://api.web3forms.com/submit" method="POST">
                
                <input type="hidden" name="access_key" value="b74be360-5d4a-4506-b071-f1ec4ff4d64b">
                <input type="hidden" name="subject" value="💎 NUEVA ORDEN DE COMPRA VIP">
                
                <input type="text" name="Nombre_Cliente" id="c-name" placeholder="Nombre Completo" required>
                <input type="tel" name="Whatsapp" id="c-phone" placeholder="Teléfono / WhatsApp" required>
                <select name="Departamento" id="c-city" required>
                    <option value="" disabled selected>Departamento de Entrega</option>
                    <option value="Choluteca">Choluteca</option>
                    <option value="Valle">Valle</option>
                </select>

                <input type="hidden" name="Detalle_del_Pedido" id="c-order-details">
                <input type="hidden" name="Total_a_Pagar" id="c-total">
                <input type="hidden" name="ID_Pedido" id="c-order-id">

                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <button type="submit" class="btn-buy"><i class="fa-solid fa-lock"></i> Pagar Ahora</button>
            </form>

            <div class="stripe-badge">
                <i class="fa-brands fa-stripe"></i>
                <span>Pagos Seguros</span>
            </div>
            <div class="apple-pay-badge">
                <i class="fa-brands fa-apple-pay"></i> <i class="fa-brands fa-cc-visa"></i> <i class="fa-brands fa-cc-mastercard"></i>
            </div>
        </div>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <h2 class="serif" style="color: var(--accent-gold); font-size: 24px;">Conectando con pasarela segura...</h2>
        <p style="font-size: 10px; color: var(--text-muted); letter-spacing: 2px; margin-top: 10px; text-transform: uppercase;">Procesando pedido y redirigiendo a Stripe</p>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('abrilCart')) || [];
        let totalFinal = 0;

        function updateCartUI() {
            const container = document.getElementById('cart-container');
            const countText = document.getElementById('cart-item-count');
            const subtotalText = document.getElementById('summary-subtotal');
            const totalText = document.getElementById('summary-total');
            
            container.innerHTML = '';
            totalFinal = 0;

            if(cart.length === 0) {
                container.innerHTML = '<p class="empty-cart-msg">Su bolsa VIP se encuentra vacía.</p>';
                countText.textContent = '0 artículos';
                subtotalText.textContent = 'L. 0';
                totalText.textContent = 'L. 0';
                document.getElementById('checkout-form').style.display = 'none';
                document.querySelector('.stripe-badge').style.display = 'none';
                document.querySelector('.apple-pay-badge').style.display = 'none';
                return;
            }

            document.getElementById('checkout-form').style.display = 'block';
            document.querySelector('.stripe-badge').style.display = 'flex';
            countText.textContent = `${cart.length} artículo(s)`;

            let ordenDetalladaParaCorreo = "";

            cart.forEach((item, index) => {
                totalFinal += item.price;
                let metaInfo = `Ref: ${item.ref} | Cant: ${item.qty}`;
                if(item.size) metaInfo += `<br>Talla/Edad: ${item.size}`;
                if(item.customText) metaInfo += `<br>${item.customText}`;

                // Construimos el texto exacto que te llegará al correo
                ordenDetalladaParaCorreo += `- ${item.qty}x ${item.name} (${item.ref}) | L.${item.price}\n`;
                if(item.size) ordenDetalladaParaCorreo += `  Talla: ${item.size}\n`;
                if(item.customText) ordenDetalladaParaCorreo += `  Grabado: ${item.customText}\n`;

                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="item-img">
                        <div class="item-details">
                            <h3 class="item-name serif">${item.name}</h3>
                            <p class="item-meta">${metaInfo}</p>
                            <p class="item-price serif">L. ${item.price}</p>
                        </div>
                        <button class="btn-remove" onclick="removeItem(${index})"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
            });

            subtotalText.textContent = `L. ${totalFinal}`;
            totalText.textContent = `L. ${totalFinal}`;

            // Metemos los datos en los inputs ocultos para que Web3Forms te los mande
            const idPedido = 'VIP-' + Math.floor(Math.random() * 1000000);
            document.getElementById('c-order-details').value = ordenDetalladaParaCorreo;
            document.getElementById('c-total').value = `L. ${totalFinal}`;
            document.getElementById('c-order-id').value = idPedido;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('abrilCart', JSON.stringify(cart));
            updateCartUI();
        }

        // CONTROL DEL ENVÍO DEL FORMULARIO Y REDIRECCIÓN
        const form = document.getElementById('checkout-form');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if(cart.length === 0) return;

            // Mostramos la pantalla de carga negra elegante
            document.getElementById('loader').classList.add('show');

            // Recogemos los datos del formulario
            const formData = new FormData(form);

            // 1. Enviamos el pedido silenciosamente a tu correo (vía Web3Forms con tu llave)
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
            })
            .then(async (response) => {
                
                // 2. Guardamos el pedido en la sección "Mis Pedidos" (con los 28 días)
                const hoy = new Date();
                const fechaEntrega = new Date(hoy);
                fechaEntrega.setDate(fechaEntrega.getDate() + 28);
                const opcionesFecha = { day: 'numeric', month: 'long', year: 'numeric' };
                
                const nuevoPedido = {
                    idPedido: document.getElementById('c-order-id').value,
                    fechaCompra: hoy.toLocaleDateString('es-ES', opcionesFecha),
                    fechaEntregaEstimada: `Estimado el ${fechaEntrega.toLocaleDateString('es-ES', opcionesFecha)}`,
                    cliente: document.getElementById('c-name').value,
                    destino: document.getElementById('c-city').value,
                    items: [...cart],
                    total: document.getElementById('summary-total').textContent,
                    estado: 'Pendiente de Pago en Stripe' 
                };

                let orders = JSON.parse(localStorage.getItem('abrilOrders')) || [];
                orders.unshift(nuevoPedido);
                localStorage.setItem('abrilOrders', JSON.stringify(orders));

                // Vaciamos carrito
                localStorage.removeItem('abrilCart');

                // 3. REDIRECCIÓN A STRIPE (AQUÍ DEBES PEGAR TU ENLACE "buy.stripe.com/...")
                const stripeLink = "https://buy.stripe.com/TU_ENLACE_AQUI"; 
                
                // Enviamos al cliente a pagar
                window.location.href = stripeLink;
            })
            .catch((error) => {
                alert("Hubo un error de conexión. Por favor intente nuevamente.");
                document.getElementById('loader').classList.remove('show');
            });
        });

        window.onload = updateCartUI;
    </script>
</body>
</html>
